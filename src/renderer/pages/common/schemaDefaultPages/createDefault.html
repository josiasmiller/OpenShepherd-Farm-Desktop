<div class="container">
    <!-- Top Section -->
    <div class="create-defaults-top-section">
        <h2>Default Settings</h2>
        <button id="create-default-btn" class="forward-button">Create New Default</button>
    </div>

    <!-- Bottom Section -->
    <div class="create-defaults-bottom-section">
        <form id="defaults-form">
            
            <div class="existing-setting-container">
                <label for="existing-settings">Start from Existing Setting:</label>
                <select id="existing-settings" name="existing-settings">
                    <option value="" disabled selected>Select a setting...</option>
                    <!-- More options will be added dynamically -->
                </select>
                
                <!-- Load Default Button -->
                <button id="load-default-btn" type="button">Load Default</button>
            </div>
            

            <label for="user_name">Username:</label>
            <input type="text" id="user_name" name="user_name">

            <label for="owner_id_contactid">Owner Contact:</label>
            <select id="owner_id_contactid" name="owner_id_contactid"></select>

            <label for="owner_id_companyid">Owner Company:</label>
            <select id="owner_id_companyid" name="owner_id_companyid"></select>

            <label for="owner_id_premiseid">Owner Premise:</label>
            <select id="owner_id_premiseid" name="owner_id_premiseid"></select>

            <label for="breeder_id_contactid">Breeder Contact:</label>
            <select id="breeder_id_contactid" name="breeder_id_contactid"></select>

            <label for="breeder_id_companyid">Breeder Company:</label>
            <select id="breeder_id_companyid" name="breeder_id_companyid"></select>

            <label for="breeder_id_premiseid">Breeder Premise:</label>
            <select id="breeder_id_premiseid" name="breeder_id_premiseid"></select>

            <label for="vet_id_contactid">Vet Contact:</label>
            <select id="vet_id_contactid" name="vet_id_contactid"></select>

            <label for="vet_id_premiseid">Vet Premise:</label>
            <select id="vet_id_premiseid" name="vet_id_premiseid"></select>

            <label for="lab_id_companyid">Lab Company:</label>
            <select id="lab_id_companyid" name="lab_id_companyid"></select>

            <label for="lab_id_premiseid">Lab Premise:</label>
            <select id="lab_id_premiseid" name="lab_id_premiseid"></select>

            <label for="id_registry_id_companyid">Registry Company:</label>
            <select id="id_registry_id_companyid" name="id_registry_id_companyid"></select>

            <label for="registry_id_premiseid">Registry Premise:</label>
            <select id="registry_id_premiseid" name="registry_id_premiseid"></select>

            <label for="id_stateid">State:</label>
            <select id="id_stateid" name="id_stateid"></select>

            <label for="id_countyid">County:</label>
            <select id="id_countyid" name="id_countyid"></select>

            <label for="id_flockprefixid">Flock Prefix:</label>
            <select id="id_flockprefixid" name="id_flockprefixid"></select>

            <label for="id_speciesid">Species:</label>
            <select id="id_speciesid" name="id_speciesid"></select>

            <label for="id_breedid">Breed:</label>
            <select id="id_breedid" name="id_breedid"></select>

            <label for="id_sexid">Sex:</label>
            <select id="id_sexid" name="id_sexid"></select>
        </form>
    </div>
</div>
